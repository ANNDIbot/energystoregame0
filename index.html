function pickFontScale(){
  const coarse=window.matchMedia&&window.matchMedia('(pointer: coarse)').matches;
  const shortSide=Math.min(window.innerWidth,window.innerHeight);
  if(coarse){
    if(shortSide<430) return 1.46;
    if(shortSide<640) return 1.36;
    return 1.28;
  }
  if(shortSide<760) return 1.2;
  return 1.08;
}
function isMobileLike(){
  return !!(window.matchMedia&&window.matchMedia('(pointer: coarse)').matches);
}
function isLandscapeViewport(){
  return window.innerWidth>=window.innerHeight;
}
function canPlayNow(){
  return !isMobileLike()||isLandscapeViewport();
}
function syncLayout(){
  // 以基础布局为中心，宽屏时仅小幅右移，避免整体过于靠右

  BTNS.next ={x:LW/2-40,y:LH-14,  w:80,h:11,label:'迎接下一位客人'};
  BTNS.diag ={x:LW-50,  y:80,     w:44,h:10,label:'查看五行'};
  BTNS.rule ={x:LW-34,  y:14,     w:28,h:9, label:'规则'};
  BTNS.assist={x:LW-66, y:14,     w:30,h:9, label:'建议'};
}
function resize(){
  const bs=getComputedStyle(document.body);
  const padX=(parseFloat(bs.paddingLeft)||0)+(parseFloat(bs.paddingRight)||0);
  const padY=(parseFloat(bs.paddingTop)||0)+(parseFloat(bs.paddingBottom)||0);
  const vw=Math.max(120,window.innerWidth-padX);
  const vh=Math.max(120,window.innerHeight-padY);
  FONT_SCALE=pickFontScale();
  const mobileLandscape=isMobileLike()&&isLandscapeViewport();
  if(mobileLandscape){
    const targetLW=Math.max(BASE_LW,Math.round(LH*(vw/vh)));
    LW=targetLW;
  } else {
    LW=BASE_LW;
  }
  C.width=LW*SC; C.height=LH*SC;
  ctx.imageSmoothingEnabled=false;
  syncLayout();
  const s=Math.min(vw/(LW*SC),vh/(LH*SC));
  if(mobileLandscape){
    // 宽屏扩展逻辑宽度，不拉伸像素，保持等比
    C.style.width=(LW*SC*s)+'px';
    C.style.height=(LH*SC*s)+'px';
  }else{
    C.style.width=(LW*SC*s)+'px';
    C.style.height=(LH*SC*s)+'px';
  }
}

// ── 基础绘图 ───────────────────────────────────────────
function p(x,y,w,h,c){
  if(!c)return;
  ctx.fillStyle=c;
  ctx.fillRect(Math.round(x)*SC,Math.round(y)*SC,Math.round(w)*SC,Math.round(h)*SC);
}
function pA(x,y,w,h,c,a){ctx.globalAlpha=a;p(x,y,w,h,c);ctx.globalAlpha=1;}
function outline(x,y,w,h,c,t){
  t=t||1;
  p(x,y,w,t,c); p(x,y+h-t,w,t,c);
  p(x,y,t,h,c); p(x+w-t,y,t,h,c);
}
// 文字（保持像素感用 Courier）
function fontPx(sz){return sz*FONT_SCALE*SC;}
function tLH(sz){return Math.ceil(sz*2.05*FONT_SCALE);}
function tx(str,x,y,sz,col,align,shadow){
  const fsz=fontPx(sz);
  ctx.font=`bold ${fsz}px "Courier New",monospace`;
  ctx.textBaseline='top'; ctx.textAlign=align||'left';
  if(shadow){ctx.fillStyle=shadow;ctx.fillText(str,Math.round(x)*SC+SC,Math.round(y)*SC+SC);}
  ctx.fillStyle=col; ctx.fillText(str,Math.round(x)*SC,Math.round(y)*SC);
}
function txC(str,cx,y,sz,col,shadow){
  ctx.font=`bold ${fontPx(sz)}px "Courier New",monospace`;
  const w=ctx.measureText(str).width/SC;
  tx(str,cx-w/2,y,sz,col,'left',shadow);
}
function txR(str,rx,y,sz,col,shadow){
  ctx.font=`bold ${fontPx(sz)}px "Courier New",monospace`;
  const w=ctx.measureText(str).width/SC;
  tx(str,rx-w,y,sz,col,'left',shadow);
}
function tW(str,sz){
  ctx.font=`bold ${fontPx(sz)}px "Courier New",monospace`;
  return ctx.measureText(str).width/SC;
}
function wrapTextLines(text,maxW,sz){
  ctx.font=`bold ${fontPx(sz)}px "Courier New",monospace`;
  const src=(text||'').split('\n');
  const out=[];
  src.forEach(seg=>{
    let line='';
    for(const ch of [...seg]){
      const test=line+ch;
      if(ctx.measureText(test).width/SC>maxW&&line){
        out.push(line);
        line=ch;
      } else {
        line=test;
      }
    }
    out.push(line||'');
  });
  return out.length?out:[''];
}
function rectOverlap(a,b){
  return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}

function drawItemIcon(el,x,y,sz){
  sz=sz||10;
  const h=Math.floor(sz/2);
  const ec=EL_C[el];

  switch(el){
    case 'wood': // 绿色幼苗
      // 茎
      p(x+h,y+h,1,h,ec.d);
      p(x+h,y+h,1,h,ec.c);
      // 叶片
      p(x+h-3,y+h-1,3,3,ec.d);
      p(x+h-2,y+h-2,2,2,ec.c);
      p(x+h+1,y+h+1,3,3,ec.d);
      p(x+h+1,y+h+1,2,2,ec.c);
      // 高光
      p(x+h-1,y+h-1,1,1,ec.l);
      p(x+h+2,y+h+2,1,1,ec.l);
      break;
    case 'water': // 蓝色水瓶/水滴
      // 瓶身
      p(x+h-2,y+2,5,7,ec.d);
      p(x+h-1,y+3,3,5,ec.c);
      p(x+h,  y+3,2,4,ec.l);
      // 瓶口
      p(x+h-1,y+1,3,2,ec.d);
      p(x+h,  y+1,1,1,ec.c);
      // 高光
      p(x+h-1,y+4,1,2,'#a0d8ff');
      break;
    case 'fire': // 红色火焰
      // 外焰
      p(x+h-1,y+h,3,h,ec.d);
      p(x+h-2,y+h-1,5,h+1,ec.c);
      p(x+h-3,y+h+1,7,h-1,ec.c);
      // 内焰
      p(x+h-1,y+h+1,3,h-1,ec.l);
      p(x+h,  y+h,  2,h-2,'#ffee80');
      // 火舌
      p(x+h,  y+h-3,1,3,ec.l);
      p(x+h-1,y+h-1,1,2,ec.c);
      p(x+h+2,y+h-1,1,2,ec.c);
      break;
    case 'metal': // 灰色齿轮
      // 齿轮外圈
      p(x+h-3,y+h-3,7,7,ec.d);
      p(x+h-2,y+h-2,5,5,ec.c);
      // 中心孔
      p(x+h-1,y+h-1,3,3,ec.d);
      p(x+h,  y+h,  1,1,C0.bg_wall);
      // 齿
      p(x+h-1,y+1,  3,2,ec.d);
      p(x+h-1,y+sz-3,3,2,ec.d);
      p(x+1,  y+h-1,2,3,ec.d);
      p(x+sz-3,y+h-1,2,3,ec.d);
      // 高光
      p(x+h-2,y+h-2,1,1,ec.l);
      break;
    case 'earth': // 棕色石块
      p(x+2,  y+4,  sz-5,sz-5,ec.d);
      p(x+3,  y+3,  sz-6,sz-5,ec.c);
      p(x+3,  y+3,  sz-8,sz-8,ec.l);
      p(x+4,  y+4,  2,2,'#e8d090');
      // 裂纹
      p(x+6,  y+5,  1,4,ec.d);
      p(x+4,  y+7,  3,1,ec.d);
      break;
  }
}

// 货架上的10个道具槽
function getItemSlot(i){
  // 参考图：货架两层，每层5个，从左到右
  const row=Math.floor(i/5), col=i%5;
  // 第一层 y≈14，第二层 y≈38（对应货架）
  return {x:10+col*19, y:14+row*24};
}

function drawItems(){
  ITEMS.forEach((item,i)=>{
    const{x,y}=getItemSlot(i);
    const ec=EL_C[item.el];
    const hov=hovItem===i;
    const used=tableItems.some(t=>t.item.id===item.id);
    const inBal=state==='balancing';

    ctx.globalAlpha=used?0.28:dim?0.32:1;

    // 图标发光底（参考图：道具悬浮在货架上，有淡发光）

      pA(x-1,y-1,14,14,ec.c,0.12);
    }

    if(rec&&inBal&&!used&&tick%24<12){
      pA(x-2,y-2,16,16,ec.c,0.25);

    if(used){
      pA(x-1,y-1,14,14,C0.black,0.5);
      txC('✓',x+6,y+2,5,C0.tg,C0.black);
    }
    // 阴阳标记（解锁后）
    if(yinYangActive){

function drawDialog(){
  if(!curNPC||dialogAlpha<=0) return;
  ctx.globalAlpha=dialogAlpha;

  // 对话框（动态高度，避免台词截断）
  const bw=Math.min(170,LW-70);
  const bx=8;
  const name=curNPC.name+'·'+curNPC.title;
  const textX=bx+24, textW=Math.max(40,bw-30);
  const lines=wrapTextLines(dialogLine,textW,3);
  const lineH=tLH(3);
  const textH=Math.max(lineH,lines.length*lineH);
  const bh=Math.min(72,Math.max(42,18+textH));
  // balancing阶段优先保证桌面物品可见，不因能量条而把对话框顶到中部
  const avoidEnergy=energyVisible&&state!=='balancing';
  const bottomLimit=avoidEnergy?(LH-56):(LH-6);
  const by=clamp(bottomLimit-bh,58,84);

  p(bx,   by,   bw,   bh,   C0.ui_dark);
  p(bx+1, by+1, bw-2, bh-2, C0.ui_mid);
  outline(bx,by,bw,bh,C0.border_gold,1);
  // 内框线
  outline(bx+2,by+2,bw-4,bh-4,C0.ui_border,1);
  // 名字标签（左角）
  const nameW=clamp(Math.ceil(tW(name,3))+8,52,bw-8);
  p(bx+2, by+2, nameW, 10, C0.ui_light);
  outline(bx+2,by+2,nameW,10,C0.border,1);
  tx(name, bx+5, by+3, 3, C0.ty,'left',C0.black);
  // 台词
  drawDialogTextLines(lines, textX, by+13, 3);

  // NPC头像小框（左侧）
  p(bx+2, by+12, 20,20, C0.bg_wall3);
  outline(bx+2,by+12,20,20,C0.border,1);
  drawAnimalNPC(bx+2,by+11,curNPC.dom,balanceDone,0);
  regUI('dialog',bx,by,bw,bh,'#ff9d66');

  ctx.globalAlpha=1;
}

function drawDialogTextLines(lines,x,y,sz){
  ctx.font=`bold ${fontPx(sz)}px "Courier New",monospace`;
  ctx.textBaseline='top'; ctx.textAlign='left';
  const lineH=tLH(sz);
  lines.forEach((line,i)=>{
    const ly=y+i*lineH;
    ctx.fillStyle=C0.black; ctx.fillText(line,(x+0.5)*SC,(ly+0.5)*SC);
    ctx.fillStyle=C0.tw;    ctx.fillText(line,x*SC,ly*SC);
  });
}

//  五行能量条（参考图：底部横排，粗边框彩色条）
// ══════════════════════════════════════════════════════
function drawEnergyBars(){
  if(!energyVisible){
    if(state==='balancing'){
      txC('[E]五行',12,LH-6,2.6,'rgba(160,140,80,0.6)',null);
    }
    return;
  }
  // 参考图：底部一排5个能量条，每条宽约30px
  const baseX=8, baseY=LH-58, barW=28, barH=32, gap=4;
  const totalW=(barW+gap)*5-gap;
  regUI('energy',baseX-4,baseY-4,totalW+8,barH+20,'#66b3ff');

  // 大背景框
  p(baseX-4,  baseY-4,  totalW+8,barH+20,C0.ui_dark);
  outline(baseX-4,baseY-4,totalW+8,barH+20,C0.border_gold,2);
  p(baseX-3,  baseY-3,  totalW+6,barH+18,C0.ui_mid);

  const yr=YEARS[yearIdx];
  ELS.forEach((el,i)=>{
    const ec=EL_C[el];
    const val=Math.min(100,Math.max(0,Math.round(dispEnergy[el]||0)));
    const bx=baseX+i*(barW+gap);
    const by=baseY;

    // 图标（上方）
    drawItemIcon(el,bx+8,by-14,12);

    // 条框
    p(bx,   by,   barW,barH,C0.ui_dark);
    outline(bx,by,barW,barH,ec.c,2);
    p(bx+2, by+2, barW-4,barH-4,ec.bg||C0.bg_floor2);

    // 填充
    const fillH=Math.round((barH-4)*val/100);
    if(fillH>0){
      p(bx+2, by+barH-2-fillH, barW-4,fillH, ec.d);
      p(bx+3, by+barH-2-fillH, barW-6,fillH, ec.c);
      if(fillH>2) p(bx+3,by+barH-2-fillH,barW-8,2,ec.l);
      // 流年加成闪烁
      if(yr.boost.includes(el)&&tick%20<10){
        pA(bx+2,by+barH-2-fillH,barW-4,2,C0.ty,0.8);
      }
      // 过旺警告
      if(val>75&&tick%14<7){
        pA(bx+2,by+barH-2-fillH,barW-4,fillH,'#ffffff',0.15);
      }
    }

    // 平衡区绿色带
    const loH=Math.round((barH-4)*BAL_LO/100);
    const hiH=Math.round((barH-4)*BAL_HI/100);
    const zoneY=by+barH-2-hiH;
    const zoneH=hiH-loH;
    pA(bx+2,zoneY,barW-4,zoneH,'#00ff60',0.10);
    // 平衡区上下边线
    pA(bx+2,zoneY,barW-4,1,'#00ff60',0.55);
    pA(bx+2,zoneY+zoneH,barW-4,1,'#00ff60',0.55);
    // 是否在区内
    const inZone=val>=BAL_LO&&val<=BAL_HI;
    if(inZone){
      pA(bx,by,barW,barH,'#00ff60',0.06);
      outline(bx,by,barW,barH,'#00ff60',2);
    }

    // 标签（下方）
    txC(ec.n,bx+barW/2,by+barH+2,3,ec.c,C0.black);
    txC(val+'%',bx+barW/2,by+barH+8,2.5,C0.tw,C0.black);
    // 在区内打勾
    if(inZone) txC('✓',bx+barW/2,by+barH+13,2.5,C0.tg,C0.black);
  });

  // 平衡状态
  const bal=getBalance();
  const bc=bal.balanced?C0.tg:bal.allInZone?C0.ty:EL_C[bal.highest].c;
  const diffLbl=getDiffLabel();
  const msg=bal.balanced?'✦ 五行平衡 ✦':
    bal.allInZone?'全入平衡区！':
    '['+diffLbl+'] '+EL_C[bal.highest].n+'气旺 偏差'+~~bal.maxDev+'→'+bal.thresh;
  txC(msg,baseX+totalW/2,baseY-20,3.5,bc,C0.black);

  // [E]关闭
  txR('[E]关',baseX+totalW+2,baseY-4,2.8,C0.tw,C0.black);
}

// ══════════════════════════════════════════════════════
//  粒子 & 浮动消息
// ══════════════════════════════════════════════════════
function burst(lx,ly,c,n){
  for(let i=0;i<(n||8);i++){
    const a=Math.PI*2*i/n+Math.random()*0.4;
    const sp=20+Math.random()*30;
    particles.push({x:lx,y:ly,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-15,
      c,life:0.8+Math.random()*0.4,ml:0.8+Math.random()*0.4});
  }
}
function tickPar(dt){
  particles=particles.filter(p2=>{
    p2.x+=p2.vx*dt; p2.y+=p2.vy*dt; p2.vy+=50*dt; p2.life-=dt;
    if(p2.life<=0)return false;
    const a=p2.life/p2.ml;
    pA(~~p2.x,~~p2.y,2,2,p2.c,a*0.9);
    return true;
  });
}
function getFloatLane(msg,c){
  const text=String(msg||'');
  // 先按语义关键词，再按颜色兜底，分配到不同显示轨道
  if(text.includes('流年')) return 'year';
  if(text.includes('五行平衡')||text.includes('谢谢')) return 'success';
  if(text.includes('对症')||text.includes('建议')) return 'hint';
  if(text.includes('撤回')||text.includes('已使用')||text.includes('最多')) return 'warn';
  if(c===C0.tr) return 'warn';
  if(c===C0.tg) return 'hint';
  if(c===C0.ty) return 'success';
  return 'info';
}
function getLaneAnchor(lane){
  switch(lane){
    case 'success': return {x:LW/2,    y:54};
    case 'hint':    return {x:LW*0.30, y:62};
    case 'warn':    return {x:LW*0.72, y:70};
    case 'year':    return {x:LW/2,    y:40};
    default:        return {x:LW/2,    y:66};
  }
}
function showF(msg,c){
  const lane=getFloatLane(msg,c);
  const base=getLaneAnchor(lane);
  // 在同类型轨道内纵向堆叠，跨类型不互相挤占
  const activeInLane=floats.filter(f=>f.life>0&&f.lane===lane).length;
  const stackOffset=Math.min(activeInLane,4)*8;
  floats.push({msg,c:c||C0.ty,x:base.x,y:base.y+stackOffset,life:2,lane});
}
function tickF(dt){
  floats=floats.filter(f=>{
    f.y-=15*dt; f.life-=dt;
    if(f.life<=0)return false;
    ctx.globalAlpha=Math.min(1,f.life);
    txC(f.msg,f.x,~~f.y,3.5,f.c,C0.black);
    ctx.globalAlpha=1; return true;
  });
}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

    txC(line,bx+bw/2,by+9+i*lineH,descSz,col,C0.black);
  });
  regUI('tooltip',bx,by,bw,bh,'#9ef0ff');
}

// ══════════════════════════════════════════════════════
//  游戏逻辑
// ══════════════════════════════════════════════════════
function getBalance(){
  const vals=ELS.map(el=>curEnergy[el]||0);
  const avg=vals.reduce((a,b)=>a+b,0)/5;
  const maxDev=Math.max(...vals.map(v=>Math.abs(v-avg)));
  const highest=ELS.reduce((a,b)=>(curEnergy[a]||0)>(curEnergy[b]||0)?a:b);
  // 区间法：视觉反馈用（绿色带）
  const allInZone=ELS.every(el=>{const v=curEnergy[el]||0;return v>=BAL_LO&&v<=BAL_HI;});
  const thresh=getBalThreshold();
  const balanced=maxDev<thresh||allInZone;
  return{balanced,allInZone,maxDev,thresh,highest};
}
function getEnergyBalance(energy){
  const vals=ELS.map(el=>energy[el]||0);
  const avg=vals.reduce((a,b)=>a+b,0)/5;
  const maxDev=Math.max(...vals.map(v=>Math.abs(v-avg)));
  const allInZone=ELS.every(el=>{const v=energy[el]||0;return v>=BAL_LO&&v<=BAL_HI;});
  const thresh=getBalThreshold();
  return {balanced:maxDev<thresh||allInZone,maxDev,allInZone,thresh};
}
function getItemEffect(item){
  if(!yinYangActive) return {self:14,beats:-18,gens:5};
  return ITEM_YANG[item.id]?YANG_EFF:YIN_EFF;
}
function getItemEffectForMode(item,yyActive){
  if(!yyActive) return {self:14,beats:-18,gens:5};
  return ITEM_YANG[item.id]?YANG_EFF:YIN_EFF;
}
function makeRoundBaseEnergy(npc){
  const energy={...npc.energy};
  YEARS[yearIdx].boost.forEach(el=>{
    energy[el]=clamp((energy[el]||0)+12,0,100);
  });
  return energy;
}
function simulateApplyItem(energy,item,yyActive){
  const e=item.el,t=BEATS[e],g=GENS[e];
  const ef=getItemEffectForMode(item,yyActive);
  const mult=YEARS[yearIdx].boost.includes(e)?1.3:1;
  energy[e]=clamp((energy[e]||0)+Math.round(ef.self*mult),0,100);
  energy[t]=clamp((energy[t]||0)+Math.round(ef.beats*mult),0,100);
  energy[g]=clamp((energy[g]||0)+Math.round(ef.gens*mult),0,100);
}
function isRoundSolvable(baseEnergy,yyActive){
  const n=ITEMS.length;
  const maxItems=getMaxItemsAllowed();
  const used=Array(n).fill(false);
  function dfs(depth,energy){
    if(depth>0&&getEnergyBalance(energy).balanced) return true;
    if(depth>=maxItems) return false;
    for(let i=0;i<n;i++){
      if(used[i]) continue;
      used[i]=true;
      const next={...energy};
      simulateApplyItem(next,ITEMS[i],yyActive);
      if(dfs(depth+1,next)) return true;
      used[i]=false;
    }
    return false;
  }
  return dfs(0,{...baseEnergy});
}
function isNpcSolvableToday(npc){
  return isRoundSolvable(makeRoundBaseEnergy(npc),yinYangActive);
}
function applyItem(item){
  const e=item.el,t=BEATS[e],g=GENS[e];
  const ef=getItemEffect(item);
  const yr=YEARS[yearIdx];
  const boosted=yr.boost.includes(e);
  const mult=boosted?1.3:1;
  const de=Math.round(ef.self*mult);
  const dt=Math.round(ef.beats*mult);
  const dg=Math.round(ef.gens*mult);
  // 记录精确 delta，供 revertItem 零误差还原
  item._delta={e:de,t:dt,g:dg,el:e,tel:t,gel:g};
  curEnergy[e]=clamp((curEnergy[e]||0)+de,0,100);
  curEnergy[t]=clamp((curEnergy[t]||0)+dt,0,100);
  curEnergy[g]=clamp((curEnergy[g]||0)+dg,0,100);
  if(boosted){
    const msgs=YEAR_BOOST_MSGS;
    const msg=msgs[~~(Math.random()*msgs.length)].replace('{el}',EL_C[e].n);
    showF(msg,'#f0c840');
    burst(~~npcX+10,npcY-8,'#f0c840',8);
  }
}
function revertItem(item){
  if(item._delta){
    const d=item._delta;
    curEnergy[d.el] =clamp((curEnergy[d.el] ||0)-d.e,0,100);
    curEnergy[d.tel]=clamp((curEnergy[d.tel]||0)-d.t,0,100);
    curEnergy[d.gel]=clamp((curEnergy[d.gel]||0)-d.g,0,100);
  } else {
    const e=item.el,t=BEATS[e],g=GENS[e];
    const ef=getItemEffect(item);
    const mult=YEARS[yearIdx].boost.includes(e)?1.3:1;
    curEnergy[e]=clamp((curEnergy[e]||0)-Math.round(ef.self*mult),0,100);
    curEnergy[t]=clamp((curEnergy[t]||0)-Math.round(ef.beats*mult),0,100);
    curEnergy[g]=clamp((curEnergy[g]||0)-Math.round(ef.gens*mult),0,100);
  }
}
function _spawnNextClient(){
  if(npcPool.length===0){
    npcPool=[...NPCS].sort(()=>Math.random()-0.5);
  }
  let pickIndex=-1;
  for(let i=0;i<npcPool.length;i++){
    if(isNpcSolvableToday(npcPool[i])){pickIndex=i;break;}
  }
  if(pickIndex<0){
    npcPool=[...NPCS].sort(()=>Math.random()-0.5);
    for(let i=0;i<npcPool.length;i++){
      if(isNpcSolvableToday(npcPool[i])){pickIndex=i;break;}
    }
  }
  if(pickIndex<0){
    pickIndex=0;
    showF('警告：未找到可解客人，已回退默认',C0.tr);
  }
  const npc={...npcPool.splice(pickIndex,1)[0]};
  npc._line=npc.lines[~~(Math.random()*npc.lines.length)];
  curNPC=npc; curEnergy=makeRoundBaseEnergy(npc);
  Object.assign(dispEnergy,curEnergy);
  tableItems=[];energyVisible=false;balanceDone=false;
  assistOpen=false;
  npcMood=0;ruleOpen=false;
  npcX=-30;dialogAlpha=0;dialogLine=npc._line;resultTimer=0;
  state='arriving';
}
function nextClient(){
  if(state!=='idle'&&state!=='title')return;
  // 第5天起开启阴阳系统
  if(day>=5&&!yinYangActive) yinYangActive=true;
  // 检查阴阳介绍弹窗（首次开启前）；关闭弹窗时调用 _spawnNextClient
  if(yinYangActive&&!yinYangIntroShown){
    yinYangIntroOpen=true;yinYangIntroShown=true;
    return;
  }
  _spawnNextClient();
}
function checkBal(){
  if(state!=='balancing')return;
  if(getBalance().balanced){
    balanceDone=true;npcMood=2;state='success';resultTimer=0;
    clientsServed++;
    const rew=15+tableItems.length*5;coins+=rew;
    showF('+'+rew+'金币 五行平衡！',C0.ty);
    burst(~~npcX+10,npcY+2,C0.ty,16);
    burst(~~npcX+10,npcY+2,EL_C[curNPC.dom].c,10);
    dialogLine='谢谢！感觉好多了！';
  }
}
function afterEnergyChanged(){
  // 所有会修改能量的操作（放置/撤回）统一走这里，避免漏判成功
  checkBal();
}
function getMaxDev(){
  const vals=ELS.map(el=>curEnergy[el]||0);
  const avg=vals.reduce((a,b)=>a+b,0)/5;
  return Math.max(...vals.map(v=>Math.abs(v-avg)));
}
function reactToPlacement(item,beforeHighest,beforeDev){
  const afterDev=getMaxDev();
  const onTarget=item.el===BEATS[beforeHighest];
  const improved=afterDev<beforeDev-0.8;
  const worsened=afterDev>beforeDev+0.8;
  if(onTarget){
    showF('对症：'+EL_C[item.el].n+'克'+EL_C[beforeHighest].n,C0.tg);
    burst(~~npcX+10,npcY-3,C0.tg,5);
  }
  // 流年提示在 applyItem 里已显示，此处不重复
  if(improved){
    npcMood=Math.min(2,npcMood+1);
    if(!balanceDone){
      dialogLine=onTarget?'就是这味道，顺多了。':'嗯，气机在回正。';
    }
  }else if(worsened){
    npcMood=Math.max(-2,npcMood-1);
    if(!balanceDone){
      dialogLine=onTarget?'方向对了，但火候还差一点。':'不太对，我体内更乱了。';
    }
  }else if(!balanceDone){
    dialogLine=onTarget?'有点见效，再试一手。':'变化不大，再调一件。';
  }
}
function npcTargetX(){
  return npcTx;
}

function placeItemByIndex(i){
  if(state!=='balancing') return;
  const item=ITEMS[i];
  if(!item) return;
  const maxItems=getMaxItemsAllowed();
  if(tableItems.length>=maxItems){showF('最多'+maxItems+'件',C0.tr);return;}
  if(tableItems.some(t=>t.item.id===item.id)){showF('已使用',C0.tr);return;}
  const beforeHighest=getBalance().highest;
  const beforeDev=getMaxDev();
  tableItems.push({item});applyItem(item);
  reactToPlacement(item,beforeHighest,beforeDev);
  const pos=getItemSlot(i);
  burst(pos.x+6,pos.y+6,EL_C[item.el].c,6);
  showF('+'+item.name,EL_C[item.el].c);
  afterEnergyChanged();
}

function undoTableItem(i){
  if(state!=='balancing') return;
  const t=tableItems[i];
  if(!t) return;
  const _mN2=getMaxItemsAllowed();
  const _sW2=Math.floor((TABLE_W-8)/_mN2);
  const tx2=TABLE_X+4+i*_sW2,ty2=TABLE_Y+1;
  revertItem(t.item);tableItems.splice(i,1);
  showF('撤回 '+t.item.name,C0.E_l);
  burst(tx2+16,ty2+5,EL_C[t.item.el].c,4);
  afterEnergyChanged();
}

// ══════════════════════════════════════════════════════
//  输入
// ══════════════════════════════════════════════════════
C.addEventListener('mousemove',e=>{
  if(!canPlayNow()) return;
  const l=toL(e); mouse.x=l.x; mouse.y=l.y;
  hovItem=null;
  if(state==='balancing'){
    ITEMS.forEach((_,i)=>{
      const{x,y}=getItemSlot(i);
      if(mouse.x>=x-1&&mouse.x<=x+13&&mouse.y>=y-1&&mouse.y<=y+13)hovItem=i;
    });
  }
});

function handlePointerDown(x,y){
  if(!canPlayNow()) return;
  // 阴阳介绍弹窗优先处理（任意点击关闭）
  if(yinYangIntroOpen){
    const bw=Math.min(210,LW-16),bh=108;
    const bx=(LW-bw)/2,by=(LH-bh)/2;
    const bbw=56,bbh=11,bbx=bx+bw/2-28,bby=by+bh-17;
    const clickedOutside=(x<bx||x>bx+bw||y<by||y>by+bh);
    const clickedBtn=(x>=bbx&&x<=bbx+bbw&&y>=bby&&y<=bby+bbh);
    if(clickedBtn||clickedOutside){
      yinYangIntroOpen=false;
      if(state==='idle') _spawnNextClient();
    }
    return;
  }
  if(curNPC&&(state==='present'||state==='balancing')&&inB(BTNS.assist)){
    assistOpen=!assistOpen;
    return;
  }
  if(state!=='title'&&inB(BTNS.rule)){ruleOpen=!ruleOpen;return;}
  if(state==='title'){if(inB(BTNS.start)){state='idle';nextClient();}return;}
  if(state==='idle'){if(inB(BTNS.next))nextClient();return;}
  if(state==='present'){
    if(inB(BTNS.diag)){energyVisible=true;state='balancing';}
    return;
  }
  if(state==='balancing'){
    // 撤回按钮
    let h=false;
    tableItems.forEach((t,i)=>{
      const _mN3=getMaxItemsAllowed();
      const _sW3=Math.floor((TABLE_W-8)/_mN3);
      const tx2=TABLE_X+4+i*_sW3;const ty2=TABLE_Y+1;
      const _bx3=tx2+(_sW3-4)-8;
      if(x>=_bx3&&x<=_bx3+8&&y>=ty2-4&&y<=ty2+3){
        undoTableItem(i);
        h=true;
      }
    });
    if(h)return;
    // 放置道具
    ITEMS.forEach((item,i)=>{
      const{x:ix,y:iy}=getItemSlot(i);
      if(x>=ix-1&&x<=ix+13&&y>=iy-1&&y<=iy+13){
        placeItemByIndex(i);
      }
    });
  }
}

C.addEventListener('click',e=>{
  const l=toL(e);
  handlePointerDown(l.x,l.y);
});

function toLTouch(e){
  const t=(e.touches&&e.touches[0])||(e.changedTouches&&e.changedTouches[0]);
  if(!t) return null;
  const r=C.getBoundingClientRect();
  return {
    x:(t.clientX-r.left)*(LW*SC/r.width)/SC,
    y:(t.clientY-r.top)*(LH*SC/r.height)/SC
  };
}

C.addEventListener('touchstart',e=>{
  const l=toLTouch(e);
  if(!l) return;
  if(!canPlayNow()){e.preventDefault();return;}
  mouse.x=l.x; mouse.y=l.y;
  e.preventDefault();
},{passive:false});

C.addEventListener('touchmove',e=>{
  const l=toLTouch(e);
  if(!l) return;
  if(!canPlayNow()){e.preventDefault();return;}
  mouse.x=l.x; mouse.y=l.y;
  hovItem=null;
  if(state==='balancing'){
    ITEMS.forEach((_,i)=>{
      const{x,y}=getItemSlot(i);
      if(mouse.x>=x-1&&mouse.x<=x+13&&mouse.y>=y-1&&mouse.y<=y+13)hovItem=i;
    });
  }
  e.preventDefault();
},{passive:false});

C.addEventListener('touchend',e=>{
  const l=toLTouch(e);
  if(!l) return;
  if(!canPlayNow()){e.preventDefault();return;}
  mouse.x=l.x; mouse.y=l.y;
  handlePointerDown(l.x,l.y);
  e.preventDefault();
},{passive:false});

window.addEventListener('contextmenu',e=>{
  if(state==='balancing'){
    e.preventDefault();
    if(tableItems.length>0) undoTableItem(tableItems.length-1);
  }
});

window.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R'){
    if(state!=='title') ruleOpen=!ruleOpen;
    return;
  }
  if(e.key==='e'||e.key==='E'){
    energyVisible=!energyVisible;
    return;
  }
  if(e.key==='Enter'||e.key===' '){
    if(state==='title'){state='idle';nextClient();return;}
    if(state==='idle'){nextClient();return;}
    if(state==='present'){energyVisible=true;state='balancing';return;}
  }
  if((e.key==='Backspace'||e.key==='Delete')&&state==='balancing'){
    e.preventDefault();
    if(tableItems.length>0) undoTableItem(tableItems.length-1);
    return;
  }
  if(state==='balancing'){
    const map={1:0,2:1,3:2,4:3,5:4,6:5,7:6,8:7,9:8,0:9};
    if(Object.prototype.hasOwnProperty.call(map,e.key)){
      placeItemByIndex(map[e.key]);
      return;
    }
    if(e.key==='Escape'){energyVisible=false;}
  }
});

// ══════════════════════════════════════════════════════
//  主循环
// ══════════════════════════════════════════════════════
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,0.05);
  last=ts; tick++; npcAnim++;

  ctx.fillStyle=C0.black; ctx.fillRect(0,0,LW*SC,LH*SC);
  if(!canPlayNow()){
    drawScene();
    drawRotateHint();
    C.style.cursor='default';
    requestAnimationFrame(loop); return;
  }

  if(state==='title'){
    drawScene();
    drawWizard();
    drawItems();
    drawHUD();
    drawTitle();
    requestAnimationFrame(loop); return;
  }

  drawScene();
  drawItems();

  // 状态机
  if(state==='arriving'){
    const tx=npcTargetX();
    npcX=lerp(npcX,tx,0.07);
    if(npcX>tx-2){npcX=tx;dialogAlpha=Math.min(1,dialogAlpha+0.08);}
    if(dialogAlpha>=0.99)state='present';
  }
  if(state==='success'){
    resultTimer+=dt;dialogAlpha=1;
    if(resultTimer>2.8)state='leaving';
  }
  if(state==='leaving'){
    npcX=lerp(npcX,-32,0.07);
    dialogAlpha=Math.max(0,dialogAlpha-0.06);
    if(npcX<-28){
      state='idle';curNPC=null;energyVisible=false;balanceDone=false;
      day++;
      if(day>1&&(day-1)%10===0){
        yearIdx=(yearIdx+1)%YEARS.length;
        showF('流年更替:'+YEARS[yearIdx].name,C0.ty);
      }
    }
  }

  ELS.forEach(el=>{dispEnergy[el]=lerp(dispEnergy[el]||0,curEnergy[el]||0,0.1);});

  drawDialog();
  drawEnergyBars();
  // 桌面物品层级始终高于对话框，避免被遮挡
  drawTableItems();
  regUI('table',TABLE_X,TABLE_Y,TABLE_W,TABLE_H,'#e3d06a');
  // 角色层在道具层之上，避免道具遮挡店主/能量精灵
  drawWizard();
  regUI('wizard',getWizardRect().x,getWizardRect().y,getWizardRect().w,getWizardRect().h,'#9a8dff');
  if(curNPC&&state!=='idle'){
    drawAnimalNPC(npcX,npcY,curNPC.dom,balanceDone||npcMood>0,npcAnim);
    regUI('spirit',npcX,npcY-3,24,21,'#6ad6ff');
    if(state==='present'||state==='balancing'){
      drawExclaim(~~npcX+4,npcY-14);
    }
  }
  tickPar(dt); tickF(dt);
  drawHUD();
  if(curNPC&&(state==='present'||state==='balancing')){
    BTNS.assist.label='建议';
    drawBtn(BTNS.assist);
  }
  drawBtn(BTNS.rule);
  drawAssistPanel();
  drawRulePanel();
  drawYinYangIntro();  // 最后画，保证在最顶层

  if(state==='idle')drawBtn(BTNS.next);
  if(state==='present')drawBtn(BTNS.diag);
  if(state==='balancing')drawTooltip();

  // 光标
  let cur='default';
  if((state==='idle'&&inB(BTNS.next))||(state==='present'&&inB(BTNS.diag))||
     (state==='title'&&inB(BTNS.start)))cur='pointer';
  if(state!=='title'&&inB(BTNS.rule))cur='pointer';
  if(curNPC&&(state==='present'||state==='balancing')&&inB(BTNS.assist))cur='pointer';
  if(state==='balancing'&&hovItem!==null)cur='pointer';
  if(state==='balancing'){
    tableItems.forEach((_,i)=>{
      const _mNc=getMaxItemsAllowed();
      const _sWc=Math.floor((TABLE_W-8)/_mNc);
      const tx2=TABLE_X+4+i*_sWc,ty2=TABLE_Y+1;
      const _bc=tx2+(_sWc-4)-8;
      if(mouse.x>=_bc&&mouse.x<=_bc+8&&mouse.y>=ty2-4&&mouse.y<=ty2+3)cur='pointer';
    });
  }
  C.style.cursor=cur;
  requestAnimationFrame(loop);
}

state='title';
requestAnimationFrame(loop);
</script>
